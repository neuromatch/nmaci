name : CI

on:
  push:
    branches: main
  pull_request:
    branches: main

env:
  NB_KERNEL: python3
  MPLBACKEND: Agg

jobs:

  run-tests:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
          jupyter kernelspec list

      - name: Execute tests
        run: pytest tests/ src/nmaci/
